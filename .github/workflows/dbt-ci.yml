name: dbt CI

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt (Postgres adapter)
        run: |
          pip install dbt-postgres

      - name: Create dbt profiles.yml from secrets
        run: |
          # Fail early with a clear message if any required secret is missing
          missing=""
          for v in DBT_HOST DBT_PORT DBT_USER DBT_PASSWORD DBT_DBNAME DBT_SCHEMA; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub Secret(s):$missing"
            echo "Add them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          my_project:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "${DBT_HOST}"
                port: ${DBT_PORT}
                user: "${DBT_USER}"
                pass: "${DBT_PASSWORD}"
                dbname: "${DBT_DBNAME}"
                schema: "${DBT_SCHEMA}"
                threads: 4
          EOF
          echo "----- rendered profiles.yml (pass redacted) -----"
          sed 's/pass:.*/pass: ***REDACTED***/' ~/.dbt/profiles.yml
          echo "-------------------------------------------------"
          echo "DBT_PORT length: ${#DBT_PORT}"
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_PORT: ${{ secrets.DBT_PORT }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}
          DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}

      - name: Run dbt build
        run: |
          dbt --version
          dbt debug
          dbt build
        working-directory: .

      - name: Upload dbt artifacts (logs + target)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            logs
            target